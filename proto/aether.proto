syntax = "proto3";

package aether;

service AetherAggregator {
    rpc RegisterNode(RegisterNodeRequest) returns (RegisterNodeResponse);
    rpc SendHeartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

service AetherNode {
    rpc RequestReverseBid(BidRequest) returns (BidResponse);
    rpc ExecuteVM(ExecuteVMRequest) returns (ExecuteVMResponse);
    rpc TeardownVM(TeardownVMRequest) returns (TeardownVMResponse);
    rpc ListVMs(ListVMsRequest) returns (ListVMsResponse);
    rpc PrepareMigration(PrepareMigrationRequest) returns (PrepareMigrationResponse);
    rpc StartMigration(StartMigrationRequest) returns (StartMigrationResponse);
}

message RegisterNodeRequest {
    string node_id = 1;
    string grpc_endpoint = 2;
    string pool = 3; // "COMPUTE" or "INFRA"
}

message RegisterNodeResponse {
    bool success = 1;
    string token = 2;
}

message HeartbeatRequest {
    string node_id = 1;
    string token = 2;
}

message HeartbeatResponse {
    bool success = 1;
}

message BidRequest {
    string workload_uuid = 1;
    int32 cpu_request = 2;
    int64 memory_request_bytes = 3;
    int64 disk_request_bytes = 4;
}

message BidResponse {
    string node_id = 1;
    int32 score = 2; // -1 if rejected, 1 to 1000 otherwise
}

message ExecuteVMRequest {
    string token = 1;
    string workload_uuid = 2;
    string name = 3;
    int32 cpu_limit = 4;
    int64 memory_limit_bytes = 5;
    string image_uri = 6;
}

message ExecuteVMResponse {
    bool success = 1;
    string ip_address = 2;
    string mac_address = 3;
    string error_message = 4;
}

message TeardownVMRequest {
    string token = 1;
    string workload_uuid = 2;
}

message TeardownVMResponse {
    bool success = 1;
    string error_message = 2;
}

message ListVMsRequest {}

message VMDetails {
    string uuid = 1;
    string name = 2;
    string state = 3;
    string ip_address = 4;
    string mac_address = 5;
}

message ListVMsResponse {
    repeated VMDetails vms = 1;
}

message TelemetryReport {
    string node_id = 1;
    double load_one = 2;
    double load_five = 3;
    double load_fifteen = 4;
    uint64 mem_total = 5;
    uint64 mem_available = 6;
    uint64 disk_total = 7;
    uint64 disk_available = 8;
    double nvme_temp = 9;
    uint32 cpu_cores = 10;
}

message ControlRequest {
    string command = 1;
    string target = 2;
}

message PrepareMigrationRequest {
    string token = 1;
    string workload_uuid = 2;
    uint32 port = 3;
    bool use_tls = 4;
}

message PrepareMigrationResponse {
    bool success = 1;
    string error_message = 2;
}

message StartMigrationRequest {
    string token = 1;
    string workload_uuid = 2;
    string destination_ip = 3;
    uint32 port = 4;
    bool use_tls = 5;
    uint64 max_bandwidth = 6;
}

message StartMigrationResponse {
    bool success = 1;
    string error_message = 2;
}

