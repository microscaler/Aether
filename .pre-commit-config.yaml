# Pre-commit hooks for Aether (Rust workspace)
# Install: pre-commit install --install-hooks

default_install_hook_types: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (check)
        entry: hack/cargo-fmt-check.sh
        language: script
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: hack/cargo-clippy.sh
        language: script
        types: [rust]
        pass_filenames: false
        require_serial: true

      - id: cargo-nextest
        name: cargo nextest
        entry: hack/cargo-nextest.sh
        language: script
        types: [rust]
        pass_filenames: false
        require_serial: true

      - id: cargo-coverage
        name: cargo coverage
        entry: hack/cargo-coverage.sh
        language: script
        types: [rust]
        pass_filenames: false
        require_serial: true
