# Pre-commit hooks for Aether (Rust workspace)
# Install: pre-commit install --install-hooks

default_install_hook_types: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (check)
        entry: hack/cargo-fmt-check.sh
        language: script
        types: [rust]
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types_or: [python]
        pass_filenames: true

      - id: ruff-lint
        name: ruff lint (pedantic)
        entry: ruff check --select ALL
        language: system
        types_or: [python]
        pass_filenames: true

      - id: mypy
        name: mypy
        entry: mypy .
        language: system
        types_or: [python]
        pass_filenames: false
        require_serial: true

      - id: cargo-clippy
        name: cargo clippy
        entry: hack/cargo-clippy.sh
        language: script
        types: [rust]
        pass_filenames: false
        require_serial: true

      - id: cargo-nextest
        name: cargo nextest
        entry: hack/cargo-nextest.sh
        language: script
        types: [rust]
        pass_filenames: false
        require_serial: true

      - id: cargo-coverage
        name: cargo coverage
        entry: hack/cargo-coverage.sh
        language: script
        types: [rust]
        pass_filenames: false
        require_serial: true
