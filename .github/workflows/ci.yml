name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci-pipeline:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Linting (Python and Rust formatting/clippy)
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pydantic

      - name: Run Ruff checks
        run: ruff check .

      - name: Run mypy type checks
        run: mypy .

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libzfslinux-dev genisoimage

      - name: Install Firecracker and Jailer
        run: |
          FC_VERSION="v1.10.1"
          ARCH=$(uname -m)
          curl -sfL "https://github.com/firecracker-microvm/firecracker/releases/download/${FC_VERSION}/firecracker-${FC_VERSION}-${ARCH}.tgz" \
            | tar -xz --strip-components=1 -C /tmp \
              "release-${FC_VERSION}-${ARCH}/firecracker-${FC_VERSION}-${ARCH}" \
              "release-${FC_VERSION}-${ARCH}/jailer-${FC_VERSION}-${ARCH}"
          sudo install -m 0755 "/tmp/firecracker-${FC_VERSION}-${ARCH}" /usr/local/bin/firecracker
          sudo install -m 0755 "/tmp/jailer-${FC_VERSION}-${ARCH}" /usr/local/bin/jailer

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings

      # 2. Build & Test
      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run workspace tests
        run: cargo nextest run --workspace --all-targets
